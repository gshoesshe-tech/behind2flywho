<script defer src="./expenses.js"></script><style>
    :root{--bg:#070b15;--text:#e8ecff;--muted:#9aa6cf;--accent:#7c5cff;--danger:#ff6b6b;--ok:#33d69f;--warn:#ffbe78;--shadow:0 18px 60px rgba(0,0,0,.55);--radius:16px}
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(1200px 500px at 55% 0%, rgba(124,92,255,.18), transparent 62%),var(--bg);color:var(--text);font:14px/1.4 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial}
    header{position:sticky;top:0;z-index:20;backdrop-filter:blur(12px);background:rgba(7,11,21,.66);border-bottom:1px solid rgba(35,48,85,.65)}
    .wrap{max-width:1180px;margin:0 auto;padding:16px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:10px}
    .badge{width:34px;height:34px;border-radius:12px;display:grid;place-items:center;background:rgba(124,92,255,.15);border:1px solid rgba(124,92,255,.35)}
    h1{font-size:18px;margin:0}.brand p{margin:0;color:var(--muted);font-size:12px}
    .actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .btn,.chip,select,input,textarea{padding:9px 12px;border-radius:12px;border:1px solid rgba(35,48,85,.85);background:rgba(11,18,36,.75);color:var(--text);font-weight:650;text-decoration:none}
    .btn{cursor:pointer}.btn.primary{background:var(--accent);border-color:rgba(124,92,255,.65)}.btn.danger{background:rgba(255,107,107,.12);border-color:rgba(255,107,107,.35);color:#ffd1d1}.btn.good{background:rgba(51,214,159,.16);border-color:rgba(51,214,159,.4);color:#caffef}.btn.warn{background:rgba(255,190,120,.14);border-color:rgba(255,190,120,.4);color:#ffe1be}
    .chip{color:var(--muted);font-size:12px}.notice{padding:10px 12px;border-radius:12px;border:1px solid rgba(255,107,107,.35);background:rgba(255,107,107,.10);color:#ffd1d1;margin-bottom:12px}
    main{padding:18px 0 34px}.grid{display:grid;gap:14px}.two{grid-template-columns:1fr 1fr}.three{grid-template-columns:repeat(3,1fr)}.four{grid-template-columns:repeat(4,1fr)}
    .card{background:linear-gradient(180deg, rgba(13,22,48,.88), rgba(11,18,36,.88));border:1px solid rgba(35,48,85,.9);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px}
    .hd{padding:14px;border-bottom:1px solid rgba(35,48,85,.55);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.hd h2{font-size:14px;margin:0}.bd{padding:14px}
    label{display:block;margin:10px 0 6px;color:var(--muted);font-size:12px}input,select,textarea{width:100%;outline:none}textarea{min-height:88px;resize:vertical}
    .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.box{padding:14px;border-radius:14px;border:1px solid rgba(35,48,85,.85);background:rgba(7,11,21,.40)}.num{font-size:22px;font-weight:900;letter-spacing:-.04em}.lbl{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:850}
    .list{display:grid;gap:12px}.item{border:1px solid rgba(35,48,85,.70);border-radius:18px;padding:14px;background:rgba(7,11,21,.28)}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.right{text-align:right}.muted{color:var(--muted)}.pill{font-size:11px;padding:5px 8px;border-radius:999px;border:1px solid rgba(35,48,85,.85);background:rgba(7,11,21,.40);color:var(--muted);display:inline-flex}.pill.ok{border-color:rgba(51,214,159,.4);color:#caffef}.pill.warn{border-color:rgba(255,190,120,.4);color:#ffe1be}.pill.bad{border-color:rgba(255,107,107,.4);color:#ffd1d1}
    table{width:100%;border-collapse:collapse;font-size:12px}th,td{padding:10px;border-bottom:1px solid rgba(35,48,85,.4);text-align:left}th{color:var(--muted);text-transform:uppercase;font-size:11px}.table-wrap{overflow:auto}
    @media(max-width:900px){.two,.three,.four,.kpis{grid-template-columns:1fr}.topbar{align-items:flex-start}}
</style></head>
<body><header><div class="wrap topbar">
<div class="brand"><div class="badge">🧾</div><div><h1>Expenses</h1><p>Owner-only money out + personal advances</p></div></div>
<div class="actions"><div id="userChip" class="chip">Checking session…</div><a class="btn" href="./orderpage.html">Orders</a><a class="btn" href="./payments.html">Payments</a><a class="btn" href="./finance.html">Finance</a><a class="btn" href="./dashboard.html">Dashboard</a><button id="btnLogout" class="btn danger">Logout</button></div>
</div></header>
<main><div class="wrap">
<div id="authError" class="notice" style="display:none"></div>
<section class="card"><div class="hd"><h2>New Expense</h2><span class="chip">Owner-only • Owner pay starts June 1, 2026</span></div>
<div class="bd"><form id="expenseForm">
<div class="grid four">
<div><label>Date</label><input id="expense_date" type="date" required></div>
<div><label>Type</label><select id="expense_type"><option value="Business">Business</option><option value="Personal">Personal</option></select></div>
<div><label>Category</label><select id="category"></select></div>
<div><label>Amount</label><input id="amount" type="number" min="0" step="0.01" required></div>
</div>
<div class="grid four">
<div><label>Payment Method</label><select id="payment_method"><option value="GCash">GCash</option><option value="Cash">Cash</option></select></div>
<div><label>Supplier Name</label><input id="supplier" placeholder="Supplier / mananahi"></div>
<div><label>Deduct from Owner Pay?</label><select id="deduct_owner_pay"><option value="NO">NO</option><option value="YES">YES</option></select></div>
<div><label>Spent By</label><input id="spent_by" value="Benz"></div>
</div>
<label>Notes</label><textarea id="notes" placeholder="Expense notes..."></textarea>
<div class="row" style="margin-top:12px"><button class="btn primary" id="btnSaveExpense" type="submit">Save Expense</button><button id="btnClear" type="button" class="btn">Clear</button><span id="formMsg" class="chip">—</span></div>
</form></div></section>

<section class="card"><div class="hd"><h2>Expense Summary</h2><button id="btnRefresh" class="btn">↻ Refresh</button></div>
<div class="bd">
<div class="grid three"><div><label>Month</label><input id="monthFilter" type="month"></div><div><label>Type</label><select id="typeFilter"><option value="all">All</option><option value="Business">Business</option><option value="Personal">Personal</option></select></div><div><label>Search</label><input id="search" placeholder="category, supplier, note"></div></div>
<div class="kpis" style="margin-top:12px">
<div class="box"><div class="num" id="kpiBusiness">₱0</div><div class="lbl">Business Expenses</div></div>
<div class="box"><div class="num" id="kpiInventory">₱0</div><div class="lbl">Inventory / Supplier</div></div>
<div class="box"><div class="num" id="kpiOwnerAdv">₱0</div><div class="lbl">Owner Advances</div></div>
<div class="box"><div class="num" id="kpiPersonal">₱0</div><div class="lbl">Personal Non-Deduct</div></div>
</div></div></section>
<section id="expenseList" class="list"></section>
</div></main></body></html>
